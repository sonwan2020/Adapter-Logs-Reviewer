<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adapter Logs Reviewer</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Left sidebar: filter panel + entry list -->
        <aside class="sidebar">
            <div class="filter-panel">
                <div class="filter-header" id="filter-toggle">
                    <h2>Filters</h2>
                    <span class="filter-toggle-icon">▾</span>
                </div>
                <div class="filter-body" id="filter-body">
                    <div class="filter-row">
                        <label for="filter-model">Model</label>
                        <select id="filter-model">
                            <option value="">All Models</option>
                        </select>
                    </div>
                    <div class="filter-row">
                        <label for="filter-time-from">From</label>
                        <input type="datetime-local" id="filter-time-from">
                    </div>
                    <div class="filter-row">
                        <label for="filter-time-to">To</label>
                        <input type="datetime-local" id="filter-time-to">
                    </div>
                    <div class="filter-row">
                        <label for="filter-search">Search</label>
                        <input type="text" id="filter-search" placeholder="Full-text search...">
                    </div>
                    <div class="filter-actions">
                        <button id="btn-upload" class="btn btn-secondary" title="Upload JSONL file">Upload</button>
                        <button id="btn-export" class="btn btn-primary" title="Export filtered JSONL">Export</button>
                    </div>
                </div>
            </div>
            <div class="entry-list">
                <!-- Log entries will be populated via JS -->
            </div>
        </aside>

        <!-- Right panel: detail view with tabs -->
        <main class="detail-panel">
            <div class="tab-bar">
                <button class="tab active" data-tab="request-comparison">Request Comparison</button>
                <button class="tab" data-tab="copilot-response">Copilot Response</button>
                <button class="tab" data-tab="tools">Tools</button>
                <button class="tab" data-tab="system-prompts">System Prompts</button>
                <button class="tab" data-tab="raw-json">Raw JSON</button>
            </div>
            <div class="tab-content">
                <p class="placeholder">Select a log entry from the sidebar to view details.</p>
            </div>
        </main>
    </div>

    <script src="/static/tabs.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
